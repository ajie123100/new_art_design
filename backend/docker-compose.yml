services:
  mysql:
    image: mysql:8.0
    container_name: artdesign-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: art_design
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: artdesign-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
