server:
  port: 8080

spring:
  application:
    name: art-admin
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      encoding: UTF-8
      schema-locations: classpath:sql/art_system.sql
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: ${SA_TOKEN_IS_CONCURRENT:true}
  is-share: ${SA_TOKEN_IS_SHARE:false}
  token-style: uuid
  is-log: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

art:
  datasource:
    note: "请通过 DB_URL、DB_USERNAME、DB_PASSWORD 配置数据库；本地开发可启用 dev profile。"
  auth:
    access-token-timeout: ${ACCESS_TOKEN_TIMEOUT:1800}
    refresh-token-timeout: ${REFRESH_TOKEN_TIMEOUT:604800}

captcha:
  enabled: true
  type: math
  length: 4
  width: 120
  height: 40
  expire: 2
